name: Missing Document Alert
description: Flag incomplete applications based on missing required documents

requirement: |
  Flag an application as incomplete if:
  - The applicant is over 18 AND hasIdentityDocument is false
  - OR the loan amount exceeds 100000 AND hasIncomeVerification is false

factTypes:
  - name: Application
    fields:
      applicationId: String
      applicantAge: int
      loanAmount: double
      hasIdentityDocument: boolean
      hasIncomeVerification: boolean
      incomplete: boolean
      missingDocumentType: String

testCases:
  - name: Adult Missing ID
    input:
      - _type: Application
        applicationId: APP001
        applicantAge: 25
        loanAmount: 50000.0
        hasIdentityDocument: false
        hasIncomeVerification: true
        incomplete: false
        missingDocumentType: none
    expectedRulesFired: 1
    expectedFields:
      incomplete: true

  - name: High Loan Missing Income Verification
    input:
      - _type: Application
        applicationId: APP002
        applicantAge: 35
        loanAmount: 150000.0
        hasIdentityDocument: true
        hasIncomeVerification: false
        incomplete: false
        missingDocumentType: none
    expectedRulesFired: 1
    expectedFields:
      incomplete: true

  - name: Complete Application
    input:
      - _type: Application
        applicationId: APP003
        applicantAge: 30
        loanAmount: 200000.0
        hasIdentityDocument: true
        hasIncomeVerification: true
        incomplete: false
        missingDocumentType: none
    expectedRulesFired: 0
    expectedFields:
      incomplete: false

  - name: Minor Without ID is OK
    input:
      - _type: Application
        applicationId: APP004
        applicantAge: 16
        loanAmount: 5000.0
        hasIdentityDocument: false
        hasIncomeVerification: false
        incomplete: false
        missingDocumentType: none
    expectedRulesFired: 0
    expectedFields:
      incomplete: false
