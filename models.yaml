    name: qwen2.5-coder:14b-instruct-q4_K_M
    temperature: 0.0
    topP: 0.9
    numPredict: 2048
    numCtx: 16384
    repeatPenalty: 1.1

  - id: qwen2.5-coder-temp02
    name: qwen2.5-coder:14b-instruct-q4_K_M
    temperature: 0.2
    topP: 0.95
    numPredict: 4096
    numCtx: 32768
    repeatPenalty: 1.0

  - name: qwen3
    temperature: 0.0
    topP: 0.9
    numPredict: 2048
    numCtx: 16384
    repeatPenalty: 1.1

  - name: granite4
    temperature: 0.1
